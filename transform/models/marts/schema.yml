version: 2

models:
  - name: daily_market_summary
    description: Per-sector daily performance — volume, average move, top gainer/loser.
    columns:
      - name: trade_date
        tests: [not_null]
      - name: sector
        tests: [not_null]
      - name: total_volume
        tests: [not_null]

  - name: weather_daily_summary
    description: Per-city daily weather aggregates from hourly observations.
    columns:
      - name: obs_date
        tests: [not_null]
      - name: city
        tests: [not_null]
      - name: hours_reported
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 24
